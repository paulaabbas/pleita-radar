name: Pleita Radar — Geração Diária

on:
  # Agendamento diário DESATIVADO por enquanto (ativar quando vender):
  # descomente as 2 linhas abaixo para ligar a geração automática às 6h BRT
  # schedule:
  #   - cron: "0 9 * * *"
  workflow_dispatch: {} # geração manual pelo botão "Run workflow"

permissions:
  contents: write

jobs:
  gerar-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Etapa 1-2 · Gerar relatório (geração + auditoria + render)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.js

      - name: Etapa 3 · Portão de confiabilidade (bloqueia publicação se reprovar)
        run: node scripts/test-confiabilidade.js

      - name: Etapa 4 · Publicar (só executa se o portão aprovar)
        run: |
          git config user.name "Pleita Radar Bot"
          git config user.email "radar@pleita.com.br"
          git add docs/
          git diff --staged --quiet || git commit -m "Radar diário $(date -u +%Y-%m-%d) [auditado+aprovado]"
          git push
